<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KyZXEAg3QhqLMpG8r+8fhAXLRk2vvoC2f3B09zVXn8CA5QIVfZOJ3BCsw2P0p/We" crossorigin="anonymous">
  <style>
    .f-img {
      width: 50px;
      height: 50px;
    }
  </style>
  <title>Title</title>
</head>
<body>
  <!-- nav -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light px-2 fw-bold sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">JEJU.COM</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNavAltMarkup">
        <div class="navbar-nav">
          <a class="nav-link" aria-current="page" href="#">Login</a>
          <a class="nav-link" href="#">Contact</a>
          <a class="nav-link" href="#">Reserve</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="container">
    <!-- section -->
    <section class="mb-5">
      <img src="images/main.jpg" class="img-fluid" alt="main page">
    </section>

    <!-- article -->
    <article>
      <h2 class="text-center fw-bold mb-3">Our Foods</h2>
      <div class="row justify-content-around">
        <a href="#" class="card col-md-6 col-lg-3 text-decoration-none">
          <img src="images/food1.jpg" alt="main page">
          <div class="card-body text-center text-dark">
            <h5 class="card-title">스시</h5>
          </div>
        </a>

        <a href="#" class="card col-md-6 col-lg-3 text-decoration-none">
          <img src="images/food2.jpg" alt="main page">
          <div class="card-body text-center text-dark">
            <h5 class="card-title">파스타&팬케이크</h5>
          </div>
        </a>

        <a href="#" class="card col-md-6 col-lg-3 text-decoration-none">
          <img src="images/food3.jpg" alt="main page">
          <div class="card-body text-center text-dark">
            <h5 class="card-title">올레시장 음식들</h5>
          </div>
        </a>

        <a href="#" class="card col-md-6 col-lg-3 text-decoration-none">
          <img src="images/food4.jpg" alt="main page">
          <div class="card-body text-center text-dark">
            <h5 class="card-title">흑돼지</h5>
          </div>
        </a>

      </div>

    </article>

    <!-- footer -->
    <footer class="d-flex justify-content-center m-5">
      <div class="px-3">
        <a href="https://www.instagram.com/">
          <img class="f-img" src="images/instagram.png" alt="instagram">
        </a>
      </div>
      <div class="px-3">
        <a href="https://www.facebook.com/">
          <img class="f-img" src="images/facebook.png" alt="facebook">
        </a>
      </div>
      <div class="px-3">
        <a href="https://twitter.com/">
          <img class="f-img" src="images/twitter.png" alt="twitter">
        </a>
      </div>
    </footer>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-U1DAWAznBHeqEIlVSCgzq+c9gqGAJn5c/t99JyeKa9xxaYpSvHU5awsuZVVFIhvj" crossorigin="anonymous"></script>
</body>
</html>
