{% extends 'base.html' %}
{% block content %}

  <h1>EDIT</h1>
  <form action="{% url 'movies:update' movie.pk %}" method="POST">
    {% csrf_token %}
    <label for="title">Title:</label>
    <input type="text" name='title' id='title' value={{ movie.title }}>
    
    <br>
    <label for="overview">Overview: </label>
    <textarea name="overview" cols="30" rows="10">{{ movie.overview }}</textarea>
    
    <br>
    <label for="poster_path">Poster_path: </label>
    <input type="text" name='poster_path' id='poster_path' value={{ movie.poster_path }}>
    
    <br>
    <button>수정</button>  
  </form>
  <a href="{% url 'movies:index' %}"><button>Back</button></a>

{% endblock  %}
